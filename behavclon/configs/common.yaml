data_dir: behavclon/dataset
img_size: [128, 64]
seed: 1
source_dir: behavclon/records
work_dir: behavclon/work_dirs

image_serializer:
  type: mlengine.dataset.serializers.ImageFileSerializer
  image_dir: ${data_dir}/images
  image_format: JPEG
  mode: RGB

converter:
  type: behavclon.converter.BehaviourRecorderConverter
  source_dir: ${source_dir}
  output_dir: ${data_dir}
  markup_filename: markup.json
  image_serializer: ${image_serializer}
  target_label: control
  augmentations:
    type: behavclon.augmentation.ImageAugmentations
    resize_center_crop: ${img_size}

dataset_train_val_splitter:
  type: mlengine.dataset.TrainValSplitter
  data_root: ${data_dir}
  scene_split:
    train: 0.8
    val: 0.2
  train_markup_filename: markup_train.json
  val_markup_filename: markup_val.json
  random_seed: ${seed}

train_dataset:
  type: behavclon.loader.BehaviourCloneDataset
  data_dir: ${data_dir}
  img_size: ${img_size}
  split: train
  seed: ${seed}
  markup_filename: markup_train.json
  image_serializer: ${image_serializer}
  augmentations:
    type: behavclon.augmentation.ImageAugmentations
    flip_h: 0.5
    brightness:
      prob: 0.5
      factor: [0.75, 1.25]
    color:
      prob: 0.5
      hue_delta: 10
      saturation_factor: [0.8, 1.2]

val_dataset:
  type: behavclon.loader.BehaviourCloneDataset
  data_dir: ${data_dir}
  img_size: ${img_size}
  split: val
  seed: ${seed}
  markup_filename: markup_val.json
  image_serializer: ${image_serializer}
  augmentations:
    type: behavclon.augmentation.ImageAugmentations

model:
  type: behavclon.model.BehaviourCloneModel
  img_size: ${img_size}
  frozen_bacbone: true
  head_dropout: 0.0
  init_ckpt: null

train_pipeline:
  type: mlengine.training.TrainValPipeline
  device: auto
  epochs: 600
  val_interval: 5
  batch_size: 64
  shuffle: true
  num_workers: 0
  amp: false
  output_dir: ${work_dir}
  metrics:
    ang_acc:
      type: mlengine.training.metrics.AngularDirectionAccuracy
  train_dataset: ${train_dataset}
  val_dataset: ${val_dataset}
  model: ${model}
  optimizer:
    type: mlengine.training.optimizers.AdamWOptimizer
    lr: 0.0001
    weight_decay: 1.0e-6
  loss:
    type: mlengine.training.losses.Loss
    loss_names: [mse]
    loss_weights: [1.0]
  weights_regularization:
    type: mlengine.training.losses.WeightsRegularization
    regularization_names: [l2_norm]
    regularization_weights: null
  monitor:
    type: mlengine.training.monitoring.TensorBoardMonitor
    logdir: ${work_dir}/tensorboard
    output_dir: ${work_dir}

export:
  type: behavclon.deploy.BehaviourCloneDeploy
  model: ${model}
  ckpt: ${work_dir}/last.pth
  output_path: ${work_dir}/model.onnx
